# First-cut Deployment + Service, modeled on ../../../sms-api/kustomize/base/api.yaml.
# Env-specific values (image tag, namespace, the EBS PVC, SMS_API_BASE, ghcr
# secret, TargetGroupBinding) are supplied by the overlays. TODO markers are
# cluster specifics for Alex to confirm.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: workbench
  labels:
    app: vivarium-workbench
spec:
  # Single replica: the workbench holds a git working copy + SQLite on an RWO
  # EBS volume, so exactly one writer. (Also why the current global-state model
  # is fine unchanged — see RFC §2B.3.)
  replicas: 1
  selector:
    matchLabels:
      app: vivarium-workbench
  template:
    metadata:
      labels:
        app: vivarium-workbench
    spec:
      # Match the shared-storage identity sms-api uses so files/git are written
      # as the expected uid/gid. TODO(alex): confirm for the workbench's EBS PVC.
      securityContext:
        runAsUser: 17163
        runAsGroup: 10000
        fsGroup: 10000
      containers:
        - name: workbench
          # Overlays pin the tag via `images:`. TODO: build + push this image.
          image: ghcr.io/vivarium-collective/vivarium-workbench:latest
          imagePullPolicy: Always
          # Serve the workspace that lives on the mounted EBS PVC.
          command: ["vivarium-workbench"]
          args:
            - "serve"
            - "--workspace"
            - "/workspace"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8000"
          ports:
            - containerPort: 8000
          env:
            # In-cluster sms-api service DNS — the only cloud backend (RFC §2B.2).
            # TODO: set the real sms-api namespace/service in each overlay.
            - name: SMS_API_BASE
              value: "http://api.sms-api-stanford.svc.cluster.local:8000"
            - name: VIVARIUM_WORKBENCH_WORKSPACE
              value: "/workspace"
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          volumeMounts:
            - name: workspace
              mountPath: /workspace
      volumes:
        # Private EBS gp3 PVC (RWO) — workspace + caches. The claim is defined in
        # the overlay (per-env volume). No shared filesystem with the compute:
        # run outputs arrive from S3 via sms-api's download (RFC §2B.3).
        - name: workspace
          persistentVolumeClaim:
            claimName: workbench-workspace
      imagePullSecrets:
        - name: ghcr-secret

---
apiVersion: v1
kind: Service
metadata:
  name: workbench
  labels:
    app: vivarium-workbench
spec:
  ports:
    - name: "8000"
      port: 8000
      targetPort: 8000
  selector:
    app: vivarium-workbench
