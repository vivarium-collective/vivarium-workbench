apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Env-agnostic base for the vivarium-workbench Deployment + Service.
# Per-environment overlays (overlays/dev, overlays/prod) pin the image tag and
# namespace, and add the EBS PVC, SMS_API_BASE, ghcr pull secret, and the
# TargetGroupBinding onto the existing internal ALB. See ../../README.md.

resources:
  - deployment.yaml

commonLabels:
  app: vivarium-workbench
