# Private EBS gp3 volume for prod's workspace (git/YAML/SQLite) + caches — its
# OWN durable volume, separate from dev. RWO, single-replica. See dev/pvc.yaml.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: workbench-workspace
spec:
  accessModes:
    - ReadWriteOnce
  # TODO(alex): confirm the EBS gp3 StorageClass name (sms-api's eks overlay
  # ships `storageclass-gp3-retain` — reuse that class if present).
  storageClassName: gp3
  resources:
    requests:
      storage: 20Gi
