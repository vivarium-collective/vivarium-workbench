# Binds the PROD workbench Service to the sms-cdk workbench target group
# (`smscdkinternalalb-workbench`). sms-cdk's `/workbench/*` + `/bigraph-loom/*`
# listener rules forward to this one target group.
#
# ⚠ SINGLE TARGET GROUP: there is exactly one workbench TG. Apply EITHER the dev
# OR the prod binding — NOT both — or the /workbench/* rule will round-robin
# across dev and prod pods. For the customer demo, apply prod (this) and leave
# dev's binding unapplied. A true simultaneous dev+prod split needs a second
# sms-cdk target group + listener rule (e.g. /workbench-dev/*).
apiVersion: elbv2.k8s.aws/v1beta1
kind: TargetGroupBinding
metadata:
  name: workbench-binding
spec:
  serviceRef:
    name: workbench
    port: 8000
  # TODO: replace with the `WorkbenchTargetGroupArn` stack output after
  # `cdk deploy` in sms-cdk (same ARN dev references — the one workbench TG).
  targetGroupARN: arn:aws-us-gov:elasticloadbalancing:us-gov-west-1:476270107793:targetgroup/smscdkinternalalb-workbench/REPLACE_AFTER_CDK_DEPLOY
