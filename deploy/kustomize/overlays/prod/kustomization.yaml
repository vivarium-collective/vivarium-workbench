apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Prod / customer-demo overlay — pinned to a known-good image tag. During the
# demo window this env is FROZEN while dev iterates (RFC §5C.2). Mirrors the dev
# overlay with its own namespace, PVC, and pinned tag.

# TODO(alex): confirm the workbench prod namespace (sms-api prod = `sms-api-stanford`).
namespace: vivarium-workbench-prod

resources:
  - ../../base
  - pvc.yaml
  # See target-group-binding.yaml: there is ONE workbench target group, so apply
  # EITHER dev's OR prod's binding — not both — until a second sms-cdk TG exists.
  - target-group-binding.yaml

images:
  - name: ghcr.io/vivarium-collective/vivarium-workbench
    # Pin to a VALIDATED build promoted from dev (a git sha) — never "latest"/"dev".
    newTag: REPLACE_WITH_VALIDATED_TAG

# The base defaults SMS_API_BASE to the sms-api-stanford in-cluster service. If
# prod's sms-api namespace differs, override it here (see the dev overlay for the
# patch shape).
