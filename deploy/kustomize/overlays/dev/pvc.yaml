# Private EBS gp3 volume for the workbench's workspace (git/YAML/SQLite) + caches
# (RFC §2B.3). RWO — one writer, matches the single-replica Deployment. Durable
# across pod restarts; NOT shared with the compute (run outputs arrive from S3 via
# sms-api).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: workbench-workspace
spec:
  accessModes:
    - ReadWriteOnce
  # TODO(alex): confirm the EBS gp3 StorageClass name. sms-api's eks overlay
  # ships a `storageclass-gp3-retain.yaml` — reuse that class if present.
  storageClassName: gp3
  resources:
    requests:
      storage: 20Gi
