# Binds the workbench Service to the ALB target group provisioned by sms-cdk
# (`smscdkinternalalb-workbench`). sms-cdk's two listener rules — `/workbench/*`
# and `/bigraph-loom/*` — both forward to this one target group. Mirrors
# sms-api's kustomize/overlays/sms-api-stanford/target-group-binding.yaml.
#
# NOTE (single TG): there is ONE workbench target group, so dev and prod cannot
# both bind it at once — the /workbench/* rule routes to whichever pods register.
# A true dev/prod split needs a second sms-cdk target group + listener rule
# (e.g. /workbench-dev/*). For the demo, bind the env that serves the demo.
apiVersion: elbv2.k8s.aws/v1beta1
kind: TargetGroupBinding
metadata:
  name: workbench-binding
spec:
  serviceRef:
    name: workbench
    port: 8000
  # TODO: replace with the `WorkbenchTargetGroupArn` stack output after
  # `cdk deploy` in sms-cdk:
  #   aws cloudformation describe-stacks --stack-name smscdk-internal-alb \
  #     --query "Stacks[0].Outputs"
  targetGroupARN: arn:aws-us-gov:elasticloadbalancing:us-gov-west-1:476270107793:targetgroup/smscdkinternalalb-workbench/REPLACE_AFTER_CDK_DEPLOY
