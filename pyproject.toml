[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "vivarium-dashboard"
version = "0.1.0"
description = "Web-based dashboard for Vivarium / process-bigraph workspaces"
authors = [{name = "Vivarium Collective", email = "team@vivarium-collective.org"}]
requires-python = ">=3.11"
dependencies = [
    "jinja2",
    "pyyaml",
    "jsonschema[format-nongpl]>=4.21",
    "pypdf>=4.0",
    "numpy",
    "process-bigraph",
    "bigraph-schema",
    "pbg-superpowers",
]

[project.optional-dependencies]
viz = ["matplotlib", "imageio", "numpy"]
dev = ["pytest>=7.4", "pytest-timeout", "pytest-json-report>=1.5"]

[project.scripts]
vivarium-dashboard = "vivarium_dashboard.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["vivarium_dashboard"]

[tool.hatch.build.targets.wheel.force-include]
"vivarium_dashboard/static" = "vivarium_dashboard/static"
"vivarium_dashboard/templates" = "vivarium_dashboard/templates"
